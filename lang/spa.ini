error_tileset_too_big = ❌ Error: el tileset excede 1024 tiles. Generados: {n}. Usa --extra-transparent-tiles 0 y optimiza colores o tamaño.
error_loading_image = ❌ Error: no se pudo cargar la imagen. Verifica que el archivo exista y sea un PNG válido. Ejemplo: gba_auto.py input.png
error_cleaning_temp = ⚠️ Advertencia: no se pudo limpiar temp/. Cierra archivos abiertos o reinicia. Detalles: {e}
error_invalid_origin = ❌ Error: --origin inválido. Usa coordenadas como "0,0", "10,20" o "1t,2t" (1t = 8px). Ejemplo: --origin 8,8
error_origin_out_of_bounds = ❌ Error: origen ({x},{y}) fuera de límites (0,0) a ({w},{h}). Ajusta --origin o usa --output-size.
error_crop_too_small = ❌ Error: área de recorte demasiado pequeña. Asegúrate de que tenga al menos 8x8 píxeles. Usa --output-size para controlar el tamaño.
error_crop_exceeds = ❌ Error: el área de recorte excede el tamaño de la imagen. Necesario: {w}x{h}, Disponible: {aw}x{ah}
error_image_too_big = ❌ Error: la imagen excede 512x512. Usa --output-size o --end para recortar.
error_dimensions_not_multiple = ❌ Error: las dimensiones deben ser múltiplo de 8. Usa --output-size para ajustar.
error_num_palettes = Error: --num-palettes debe estar entre 1 y 16.
error_start_index = Error: --start-index debe estar entre 0 y 15.
error_end_and_output_size = Error: --end y --output-size no pueden usarse juntos.
error_transparent_color = Error: --transparent-color debe ser 'R,G,B' con valores entre 0 y 255.
