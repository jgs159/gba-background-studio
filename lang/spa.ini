; ── CLI help (core/main.py argparse) ─────────────────────────────────────────
help_description = Convertir PNG o BMP a GBA 4bpp con múltiples paletas.
help_epilog = Ejemplos:\n  gba_auto.py portada.png --num-palettes 4 --output-size screen --transparent-color "0,200,0"\n  gba_auto.py bg.png --tilemap map.bin --start-index 4 --keep-transparent\n  gba_auto.py sprite.png --origin 16,16 --end 64,64 --extra-transparent-tiles 2\n  gba_auto.py full.png --output-size bg1 --keep-temp\n\nNotas:\n  - Usa --transparent-color para definir el color transparente (por defecto: 0,0,0).\n  - Usa --keep-transparent para preservar ese color en la paleta.\n  - --output-size acepta: screen, bg0, bg1, bg2, bg3, o Wt,Ht (ej. 8t,8t = 64x64).\n  - Todas las coordenadas pueden usar 't' para unidades de tile (1t = 8px).
