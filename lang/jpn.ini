[lang]
palette_saved = ✓ パレットを保存: output/palette.pal
tilemap_saved = ✓ タイルマップを保存: output/map.bin
tileset_saved = ✓ タイルセットを保存 ({n} タイル, パディング: {padding}): output/tiles.png
preview_generated = ✓ プレビューを生成: {path}
temp_files_removed = 🗑️ 一時ファイルを削除、temp/ フォルダは空
temp_files_preserved = 📁 一時ファイルを temp/ に保持
process_completed = ✅ 処理完了。ユニークなタイル: {n}
process_completed_extra = ✅ 処理完了。ユニークなタイル: {real} + {extra} 透過分 = {total} 合計タイル
note_transparency = ℹ️  メモ: タイルID 0 は透過にのみ使用されます。
local_palette_usage = 📊 ローカルパレット使用状況: {counts}
error_tileset_too_big = ❌ エラー: タイルセットが1024を超えました。生成数: {n}。--extra-transparent-tiles 0 を使い、色数やサイズを減らしてください。
error_loading_image = ❌ エラー: 画像の読み込みに失敗。ファイルが存在し、有効なPNGであるか確認。例: gba_auto.py input.png
error_cleaning_temp = ⚠️ 警告: temp/ のクリーンアップ失敗。開いているファイルを閉じるか再起動。詳細: {e}
error_invalid_origin = ❌ エラー: --origin が無効。"0,0"、"10,20"、"1t,2t" (1t=8px) のように指定。例: --origin 8,8
error_origin_out_of_bounds = ❌ エラー: 原点 ({x},{y}) が範囲外 (0,0)～({w},{h})。--origin を調整、または --output-size を使用。
error_crop_too_small = ❌ エラー: クロップ範囲が小さすぎます。最低8x8ピクセル必要。--output-size でサイズを制御。
error_crop_exceeds = ❌ エラー: クロップ範囲が画像サイズを超えています。必要: {w}x{h}, 可能: {aw}x{ah}
error_image_too_big = ❌ エラー: 画像が512x512を超えています。--output-size または --end で切り取ってください。
error_dimensions_not_multiple = ❌ エラー: サイズは8の倍数である必要があります。--output-size で調整してください。
error_num_palettes = エラー: --num-palettes は1から16の間でなければなりません。
error_start_index = エラー: --start-index は0から15の間でなければなりません。
error_end_and_output_size = エラー: --end と --output-size は同時に使用できません。
error_transparent_color = エラー: --transparent-color は 'R,G,B' 形式で0〜255の値である必要があります。
preprocessing_replacing = ✓ 前処理: {trans} を → MARKER_COLOR {marker} に置換
opaque_pixels =   → 不透明ピクセル {trans}: {count}
replaced_pixels =   → 置換: {count} ピクセル → {marker}
marker_image_saved =   → マーカー画像を保存: {path}
image_valid = ✓ 画像有効: {w}x{h} px
padded_image = ✓ {w}x{h} px まで透過タイルでパディング
splitting_groups = 1. グループに分割 (MARKER_COLOR 背景)... OK
quantizing_irfanview = 2. IrfanViewで量子化... OK
applying_gba_palette = 3. GBAパレット形式を適用... OK
extracting_palettes = 4. パレットを抽出... OK
rebuilding_image = 5. 最終画像を再構築... OK
generating_assets = 6. 最終アセットを生成... OK
indexed_with_palette = ↳ 強制パレットでインデックス: {path}
error_ensure_gba = ❌ エラー: {e}
error_apply_gba_palette = ❌ GBAパレット適用エラー グループ_{i}: {e}
error_preview = ❌ preview.png 生成エラー: {e}
error_tilemap_num_palettes_forbidden = ❌ エラー: --tilemap と --num-palettes を同時に使用できません。パレット数はタイルマップによって決定されます。--num-palettes オプションを削除してください。
help_description = PNGを複数パレットでGBA 4bppに変換。
help_epilog = 例:\n  gba_auto.py portada.png --num-palettes 4 --output-size screen --transparent-color \"0,200,0\"\n  gba_auto.py bg.png --tilemap map.bin --start-index 4 --keep-transparent\n  gba_auto.py sprite.png --origin 16,16 --end 64,64 --extra-transparent-tiles 2\n  gba_auto.py full.png --output-size bg1 --keep-temp\n\n注意:\n  - --transparent-color で透過色を定義 (デフォルト: 0,0,0)。\n  - --keep-transparent でパレットにその色を保持。\n  - --output-size は screen, bg0, bg1, bg2, bg3, または Wt,Ht (例 8t,8t = 64x64) を受け付けます。\n  - すべての座標は 't' をタイル単位で使用できます (1t = 8px)
