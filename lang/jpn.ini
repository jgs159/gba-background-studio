; ── CLI help (core/main.py argparse) ─────────────────────────────────────────
help_description = PNG または BMP を GBA 4bpp マルチパレット形式に変換します。
help_epilog = 例:\n  gba_auto.py portada.png --num-palettes 4 --output-size screen\n  gba_auto.py bg.png --tilemap map.bin --start-index 4\n  gba_auto.py sprite.png --origin 16,16 --end 64,64\n\n備考:\n  - --transparent-color 透明色を定義します（デフォルト: 0,0,0）。\n  - --keep-transparent パレット内の色を維持します。\n  - --output-size: screen, bg0, bg1, bg2, bg3, または Wt,Ht を指定可能です。
