about_title = About GBA Background Studio
about_text = <h3>GBA Background Studio</h3>
             <p>A tool to create backgrounds for Game Boy Advance.</p>
             <p>Features:</p>
             <ul>
                 <li>Load and crop images</li>
                 <li>Select output area</li>
                 <li>Edit tile palettes</li>
                 <li>Generate tileset, tilemap and palette</li>
             </ul>
             <p>Ideal for ROM hacks, homebrew and GBA development.</p>
