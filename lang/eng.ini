help_description = Convert PNG or BMP to GBA 4bpp with multiple palettes.
help_epilog = Examples:\n  gba_auto.py portada.png --num-palettes 4 --output-size screen --transparent-color "0,200,0"\n  gba_auto.py bg.png --tilemap map.bin --start-index 4 --keep-transparent\n  gba_auto.py sprite.png --origin 16,16 --end 64,64 --extra-transparent-tiles 2\n  gba_auto.py full.png --output-size bg1 --keep-temp\n\nNotes:\n  - Use --transparent-color to define the transparent color (default: 0,0,0).\n  - Use --keep-transparent to preserve that color in the palette.\n  - --output-size accepts: screen, bg0, bg1, bg2, bg3, or Wt,Ht (e.g. 8t,8t = 64x64).\n  - All coordinates can use 't' for tile units (1t = 8px).
