help_description = Konvertiere PNG in GBA 4bpp mit mehreren Paletten.
help_epilog = Beispiele:\n  gba_auto.py portada.png --num-palettes 4 --output-size screen --transparent-color \"0,200,0\"\n  gba_auto.py bg.png --tilemap map.bin --start-index 4 --keep-transparent\n  gba_auto.py sprite.png --origin 16,16 --end 64,64 --extra-transparent-tiles 2\n  gba_auto.py full.png --output-size bg1 --keep-temp\n\nHinweise:\n  - Verwende --transparent-color, um die Transparenzfarbe zu definieren (Standard: 0,0,0).\n  - Verwende --keep-transparent, um diese Farbe in der Palette zu behalten.\n  - --output-size akzeptiert: screen, bg0, bg1, bg2, bg3 oder Wt,Ht (z.B. 8t,8t = 64x64).\n  - Alle Koordinaten können 't' für Tile-Einheiten verwenden (1t = 8px)
