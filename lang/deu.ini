; ── CLI help (core/main.py argparse) ─────────────────────────────────────────
help_description = Konvertiert PNG oder BMP nach GBA 4bpp mit mehreren Paletten.
help_epilog = Beispiele:\n  gba_auto.py portada.png --num-palettes 4 --output-size screen --transparent-color "0,200,0"\n  gba_auto.py bg.png --tilemap map.bin --start-index 4 --keep-transparent\n  gba_auto.py sprite.png --origin 16,16 --end 64,64\n  gba_auto.py full.png --output-size bg1\n\nHinweise:\n  - --transparent-color definiert Transparenz (Standard: 0,0,0).\n  - --keep-transparent erhält die Farbe in der Palette.\n  - --output-size akzeptiert: screen, bg0, bg1, bg2, bg3, oder Wt,Ht.\n  - Alle Koordinaten können 't' für Tiles nutzen (1t = 8px).
