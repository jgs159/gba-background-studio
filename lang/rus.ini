; ── CLI help (core/main.py argparse) ─────────────────────────────────────────
help_description = Конвертирует PNG или BMP в формат GBA 4bpp.
help_epilog = Примеры:\n  gba_auto.py portada.png --num-palettes 4 --output-size screen\n  gba_auto.py bg.png --tilemap map.bin --start-index 4\n  gba_auto.py sprite.png --origin 16,16 --end 64,64\n\nПримечания:\n  - --transparent-color задает прозрачность (по умолчанию: 0,0,0).\n  - --keep-transparent сохраняет цвет в палитре.\n  - --output-size: screen, bg0, bg1, bg2, bg3 или Wt,Ht.
