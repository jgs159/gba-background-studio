[lang]
palette_saved = ✓ Палитра сохранена: output/palette.pal
tilemap_saved = ✓ Карта тайлов сохранена: output/map.bin
tileset_saved = ✓ Набор тайлов сохранён ({n} тайлов, отступ: {padding}): output/tiles.png
preview_generated = ✓ Предпросмотр создан: {path}
temp_files_removed = 🗑️ Временные файлы удалены, папка temp/ пуста
temp_files_preserved = 📁 Временные файлы сохранены в temp/
process_completed = ✅ Процесс завершён. Уникальные тайлы: {n}
process_completed_extra = ✅ Процесс завершён. Уникальные тайлы: {real} + {extra} прозрачные = {total} всего тайлов
note_transparency = ℹ️  Примечание: ID тайла 0 — единственный, используемый для прозрачности.
local_palette_usage = 📊 Использование локальных палитр: {counts}
error_tileset_too_big = ❌ Ошибка: набор тайлов превышает 1024. Сгенерировано: {n}. Используйте --extra-transparent-tiles 0 и уменьшите цвета или размер.
error_loading_image = ❌ Ошибка: не удалось загрузить изображение. Проверьте, существует ли файл и является ли он корректным PNG. Пример: gba_auto.py input.png
error_cleaning_temp = ⚠️ Предупреждение: не удалось очистить temp/. Закройте открытые файлы или перезапустите. Детали: {e}
error_invalid_origin = ❌ Ошибка: неверный --origin. Используйте координаты вроде "0,0", "10,20" или "1t,2t" (1t = 8px). Пример: --origin 8,8
error_origin_out_of_bounds = ❌ Ошибка: начало ({x},{y}) вне границ (0,0) до ({w},{h}). Измените --origin или используйте --output-size.
error_crop_too_small = ❌ Ошибка: область обрезки слишком мала. Минимум 8x8 пикселей. Используйте --output-size для контроля размера.
error_crop_exceeds = ❌ Ошибка: область обрезки превышает размер изображения. Нужно: {w}x{h}, Доступно: {aw}x{ah}
error_image_too_big = ❌ Ошибка: изображение превышает 512x512. Используйте --output-size или --end для обрезки.
error_dimensions_not_multiple = ❌ Ошибка: размеры должны быть кратны 8. Используйте --output-size для настройки.
error_num_palettes = Ошибка: --num-palettes должно быть от 1 до 16.
error_start_index = Ошибка: --start-index должно быть от 0 до 15.
error_end_and_output_size = Ошибка: --end и --output-size нельзя использовать вместе.
error_transparent_color = Ошибка: --transparent-color должен быть в формате 'R,G,B' с значениями от 0 до 255.
preprocessing_replacing = ✓ Предварительная обработка: замена {trans} → MARKER_COLOR {marker}
opaque_pixels =   → Непрозрачные пиксели {trans}: {count}
replaced_pixels =   → Заменено: {count} пикселей → {marker}
marker_image_saved =   → Изображение с маркером сохранено: {path}
image_valid = ✓ Изображение валидно: {w}x{h} px
padded_image = ✓ Дополнено до {w}x{h} px прозрачными тайлами
splitting_groups = 1. Разделение на группы (фон MARKER_COLOR)... OK
quantizing_4bpp = 2. Квантование с IrfanView... OK
applying_gba_palette = 3. Применение формата палитры GBA... OK
extracting_palettes = 4. Извлечение палитр... OK
rebuilding_image = 5. Восстановление финального изображения... OK
generating_assets = 6. Генерация финальных ресурсов... OK
indexed_with_palette = ↳ Индексировано с принудительной палитрой: {path}
error_ensure_gba = ❌ Ошибка: {e}
error_apply_gba_palette = ❌ Ошибка применения палитры GBA к группе_{i}: {e}
error_preview = ❌ Ошибка создания preview.png: {e}
error_tilemap_num_palettes_forbidden = ❌ Ошибка: нельзя использовать --num-palettes с --tilemap. Количество палитр определяется тайлмапом. Удалите параметр --num-palettes.
help_description = Преобразование PNG в GBA 4bpp с несколькими палитрами.
help_epilog = Примеры:\n  gba_auto.py portada.png --num-palettes 4 --output-size screen --transparent-color \"0,200,0\"\n  gba_auto.py bg.png --tilemap map.bin --start-index 4 --keep-transparent\n  gba_auto.py sprite.png --origin 16,16 --end 64,64 --extra-transparent-tiles 2\n  gba_auto.py full.png --output-size bg1 --keep-temp\n\nПримечания:\n  - Используйте --transparent-color для определения прозрачного цвета (по умолчанию: 0,0,0).\n  - Используйте --keep-transparent, чтобы сохранить этот цвет в палитре.\n  - --output-size принимает: screen, bg0, bg1, bg2, bg3 или Wt,Ht (напр. 8t,8t = 64x64).\n  - Все координаты могут использовать 't' для единиц тайлов (1t = 8px)
