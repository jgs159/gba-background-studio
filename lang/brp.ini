; ── CLI help (core/main.py argparse) ─────────────────────────────────────────
help_description = Converte PNG ou BMP para GBA 4bpp com múltiplas paletas.
help_epilog = Exemplos:\n gba_auto.py portada.png --num-palettes 4 --output-size screen --transparent-color "0,200,0"\n gba_auto.py bg.png --tilemap map.bin --start-index 4 --keep-transparent\n\nNotas:\n - Use --transparent-color para definir a cor transparente (padrão: 0,0,0).\n - Use --keep-transparent para preservar essa cor na paleta.\n - --output-size aceita: screen, bg0, bg1, bg2, bg3, ou Wt,Ht.
