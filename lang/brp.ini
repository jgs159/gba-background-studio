help_description = Converte PNG para 4bpp GBA com múltiplas paletas.
help_epilog = Exemplos:\n  gba_auto.py portada.png --num-palettes 4 --output-size screen --transparent-color \"0,200,0\"\n  gba_auto.py bg.png --tilemap map.bin --start-index 4 --keep-transparent\n  gba_auto.py sprite.png --origin 16,16 --end 64,64 --extra-transparent-tiles 2\n  gba_auto.py full.png --output-size bg1 --keep-temp\n\nNotas:\n  - Use --transparent-color para definir a cor transparente (padrão: 0,0,0).\n  - Use --keep-transparent para manter essa cor na paleta.\n  - --output-size aceita: screen, bg0, bg1, bg2, bg3 ou Wt,Ht (ex: 8t,8t = 64x64).\n  - Todas as coordenadas podem usar 't' para unidades de tile (1t = 8px)
