process_completed_extra = ✅ प्रक्रिया पूरी। अद्वितीय टाइल्स: {real} + {extra} अतिरिक्त पारदर्शी = {total} कुल टाइल्स
note_transparency = ℹ️  नोट: टाइल आईडी 0 केवल पारदर्शिता के लिए उपयोग की जाती है।
local_palette_usage = 📊 स्थानीय पैलेट उपयोग: {counts}
error_tileset_too_big = ❌ त्रुटि: टाइलसेट 1024 टाइल्स से अधिक है। उत्पन्न: {n}। --extra-transparent-tiles 0 का उपयोग करें और रंगों या आकार को कम करें।
error_loading_image = ❌ त्रुटि: छवि लोड करने में विफल। सुनिश्चित करें कि फ़ाइल मौजूद है और एक वैध PNG है। उदाहरण: gba_auto.py input.png
error_cleaning_temp = ⚠️ चेतावनी: temp/ साफ़ करने में विफल। खुली फ़ाइलें बंद करें या पुनरारंभ करें। विवरण: {e}
error_invalid_origin = ❌ त्रुटि: अमान्य --origin। "0,0", "10,20" या "1t,2t" (1t = 8px) जैसे निर्देशांक का उपयोग करें। उदाहरण: --origin 8,8
error_origin_out_of_bounds = ❌ त्रुटि: मूल ({x},{y}) सीमाओं (0,0) से ({w},{h}) के बाहर है। --origin समायोजित करें या --output-size का उपयोग करें।
error_crop_too_small = ❌ त्रुटि: क्रॉप क्षेत्र बहुत छोटा है। कम से कम 8x8 पिक्सेल होना चाहिए। आयाम नियंत्रित करने के लिए --output-size का उपयोग करें।
error_crop_exceeds = ❌ त्रुटि: क्रॉप क्षेत्र छवि के आकार से अधिक है। आवश्यक: {w}x{h}, उपलब्ध: {aw}x{ah}
error_image_too_big = ❌ त्रुटि: छवि 512x512 से अधिक है। क्रॉप करने के लिए --output-size या --end का उपयोग करें।
error_dimensions_not_multiple = ❌ त्रुटि: आयाम 8 के गुणज होने चाहिए। समायोजित करने के लिए --output-size का उपयोग करें।
error_num_palettes = त्रुटि: --num-palettes 1 और 16 के बीच होना चाहिए।
error_start_index = त्रुटि: --start-index 0 और 15 के बीच होना चाहिए।
error_end_and_output_size = त्रुटि: --end और --output-size का एक साथ उपयोग नहीं किया जा सकता।
error_transparent_color = त्रुटि: --transparent-color 'R,G,B' होना चाहिए जिसके मान 0 और 255 के बीच हों।
preprocessing_replacing = ✓ पूर्व-संसाधन: {trans} को → MARKER_COLOR {marker} से बदल रहा है
opaque_pixels =   → अपारदर्शी पिक्सेल {trans}: {count}
replaced_pixels =   → बदले गए: {count} पिक्सेल → {marker}
marker_image_saved =   → मार्कर छवि सहेजी गई: {path}
image_valid = ✓ छवि वैध है: {w}x{h} पिक्सेल
padded_image = ✓ {w}x{h} पिक्सेल में पारदर्शी टाइल्स के साथ भरा गया
splitting_groups = 1. समूहों में विभाजित करना (MARKER_COLOR पृष्ठभूमि)... ठीक है
quantizing_irfanview = 2. IrfanView के साथ क्वांटाइज़िंग... ठीक है
applying_gba_palette = 3. GBA पैलेट प्रारूप लागू करना... ठीक है
extracting_palettes = 4. पैलेट्स निकालना... ठीक है
rebuilding_image = 5. अंतिम छवि का पुनर्निर्माण... ठीक है
generating_assets = 6. अंतिम संपत्ति उत्पन्न करना... ठीक है
indexed_with_palette = ↳ जबरदस्ती पैलेट के साथ अनुक्रमित: {path}
error_ensure_gba = ❌ त्रुटि: {e}
error_apply_gba_palette = ❌ GBA पैलेट लागू करने में त्रुटि समूह_{i}: {e}
error_preview = ❌ preview.png उत्पन्न करने में त्रुटि: {e}
error_tilemap_num_palettes_forbidden = ❌ त्रुटि: --tilemap के साथ --num-palettes का उपयोग नहीं किया जा सकता। पैलेट की संख्या टाइलमैप द्वारा निर्धारित की जाती है। --num-palettes विकल्प हटा दें।
help_description = एकाधिक पैलेट्स के साथ GBA 4bpp में PNG परिवर्तित करें।
help_epilog = उदाहरण:\n  gba_auto.py portada.png --num-palettes 4 --output-size screen --transparent-color \"0,200,0\"\n  gba_auto.py bg.png --tilemap map.bin --start-index 4 --keep-transparent\n  gba_auto.py sprite.png --origin 16,16 --end 64,64 --extra-transparent-tiles 2\n  gba_auto.py full.png --output-size bg1 --keep-temp\n\nनोट:\n  - पारदर्शी रंग परिभाषित करने के लिए --transparent-color का उपयोग करें (डिफ़ॉल्ट: 0,0,0)।\n  - पैलेट में उस रंग को बनाए रखने के लिए --keep-transparent का उपयोग करें।\n  - --output-size स्वीकार करता है: screen, bg0, bg1, bg2, bg3, या Wt,Ht (उदा. 8t,8t = 64x64)।\n  - सभी निर्देशांक टाइल इकाइयों के लिए 't' का उपयोग कर सकते हैं (1t = 8px)
