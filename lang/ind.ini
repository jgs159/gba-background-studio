[lang]
palette_saved = ✓ Palet disimpan: output/palette.pal
tilemap_saved = ✓ Peta ubin disimpan: output/map.bin
tileset_saved = ✓ Set ubin disimpan ({n} ubin, padding: {padding}): output/tiles.png
preview_generated = ✓ Pratinjau dibuat: {path}
temp_files_removed = 🗑️ File sementara dihapus, folder temp/ kosong
temp_files_preserved = 📁 File sementara dipertahankan di temp/
process_completed = ✅ Proses selesai. Ubin unik: {n}
process_completed_extra = ✅ Proses selesai. Ubin unik: {real} + {extra} transparan tambahan = {total} total ubin
note_transparency = ℹ️  Catatan: ID ubin 0 adalah satu-satunya yang digunakan untuk transparansi.
local_palette_usage = 📊 Penggunaan palet lokal: {counts}
error_tileset_too_big = ❌ Kesalahan: set ubin melebihi 1024 ubin. Dihasilkan: {n}. Gunakan --extra-transparent-tiles 0 dan kurangi penggunaan warna atau ukuran.
error_loading_image = ❌ Kesalahan: gagal memuat gambar. Periksa apakah file ada dan merupakan PNG yang valid. Contoh: gba_auto.py input.png
error_cleaning_temp = ⚠️ Peringatan: gagal membersihkan temp/. Tutup file yang terbuka atau restart. Detail: {e}
error_invalid_origin = ❌ Kesalahan: --origin tidak valid. Gunakan koordinat seperti "0,0", "10,20" atau "1t,2t" (1t = 8px). Contoh: --origin 8,8
error_origin_out_of_bounds = ❌ Kesalahan: asal ({x},{y}) di luar batas (0,0) hingga ({w},{h}). Sesuaikan --origin atau gunakan --output-size.
error_crop_too_small = ❌ Kesalahan: area potong terlalu kecil. Harus minimal 8x8 piksel. Gunakan --output-size untuk mengatur dimensi.
error_crop_exceeds = ❌ Kesalahan: area potong melebihi ukuran gambar. Diperlukan: {w}x{h}, Tersedia: {aw}x{ah}
error_image_too_big = ❌ Kesalahan: gambar melebihi 512x512. Gunakan --output-size atau --end untuk memotong.
error_dimensions_not_multiple = ❌ Kesalahan: dimensi harus kelipatan 8. Gunakan --output-size untuk menyesuaikan.
error_num_palettes = Kesalahan: --num-palettes harus antara 1 dan 16.
error_start_index = Kesalahan: --start-index harus antara 0 dan 15.
error_end_and_output_size = Kesalahan: --end dan --output-size tidak bisa digunakan bersamaan.
error_transparent_color = Kesalahan: --transparent-color harus 'R,G,B' dengan nilai antara 0 dan 255.
preprocessing_replacing = ✓ Pra-pemrosesan: mengganti {trans} → MARKER_COLOR {marker}
opaque_pixels =   → Piksel buram {trans}: {count}
replaced_pixels =   → Diganti: {count} piksel → {marker}
marker_image_saved =   → Gambar penanda disimpan: {path}
image_valid = ✓ Gambar valid: {w}x{h} px
padded_image = ✓ Diisi ke {w}x{h} px dengan ubin transparan
splitting_groups = 1. Membagi ke grup (latar belakang MARKER_COLOR)... OK
quantizing_irfanview = 2. Kuantisasi dengan IrfanView... OK
applying_gba_palette = 3. Menerapkan format palet GBA... OK
extracting_palettes = 4. Mengekstrak palet... OK
rebuilding_image = 5. Membangun ulang gambar akhir... OK
generating_assets = 6. Menghasilkan aset akhir... OK
indexed_with_palette = ↳ Diindeks dengan palet paksa: {path}
error_ensure_gba = ❌ Kesalahan: {e}
error_apply_gba_palette = ❌ Kesalahan menerapkan palet GBA ke grup_{i}: {e}
error_preview = ❌ Kesalahan membuat preview.png: {e}
error_tilemap_num_palettes_forbidden = ❌ Kesalahan: tidak dapat menggunakan --num-palettes dengan --tilemap. Jumlah palet ditentukan oleh tilemap. Hapus opsi --num-palettes.
help_description = Konversi PNG ke GBA 4bpp dengan banyak palet.
help_epilog = Contoh:\n  gba_auto.py portada.png --num-palettes 4 --output-size screen --transparent-color \"0,200,0\"\n  gba_auto.py bg.png --tilemap map.bin --start-index 4 --keep-transparent\n  gba_auto.py sprite.png --origin 16,16 --end 64,64 --extra-transparent-tiles 2\n  gba_auto.py full.png --output-size bg1 --keep-temp\n\nCatatan:\n  - Gunakan --transparent-color untuk menentukan warna transparan (default: 0,0,0).\n  - Gunakan --keep-transparent untuk mempertahankan warna itu di palet.\n  - --output-size menerima: screen, bg0, bg1, bg2, bg3, atau Wt,Ht (contoh: 8t,8t = 64x64).\n  - Semua koordinat bisa menggunakan 't' untuk satuan ubin (1t = 8px)
