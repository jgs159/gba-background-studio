contribute_text = <h3>❤️ Dukung Pengembangan GBA Background Studio</h3><p>Jika Anda menyukai aplikasi ini dan merasa terbantu untuk proyek GBA Anda, mohon pertimbangkan untuk mendukung karya saya!</p><p>Dukungan Anda membantu saya melanjutkan pengembangan, menambahkan fitur baru, dan memberikan pembaruan rutin.</p><p><b>Anda dapat mendukung saya dengan donasi melalui:</b></p><p style="text-align: center; font-size: 14px;"><a href="https://ko-fi.com/compumax">https://ko-fi.com/compumax</a></p><p>Setiap kontribusi, sekecil apa pun, sangat berarti! Terima kasih telah menggunakan GBA Background Studio. 🎮</p>

