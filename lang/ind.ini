; ── CLI help (core/main.py argparse) ─────────────────────────────────────────
help_description = Mengonversi PNG atau BMP ke GBA 4bpp multi-palet.
help_epilog = Contoh:\n  gba_auto.py portada.png --num-palettes 4 --output-size screen\n  gba_auto.py bg.png --tilemap map.bin --start-index 4\n  gba_auto.py sprite.png --origin 16,16 --end 64,64\n\nCatatan:\n  - --transparent-color mendefinisikan transparansi (default: 0,0,0).\n  - --keep-transparent mempertahankan warna dalam palet.\n  - --output-size menerima: screen, bg0, bg1, bg2, bg3, atau Wt,Ht.
