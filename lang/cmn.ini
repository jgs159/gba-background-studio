[lang]
palette_saved = ✓ 调色板已保存: output/palette.pal
tilemap_saved = ✓ 地图已保存: output/map.bin
tileset_saved = ✓ 图块集已保存 ({n} 图块, 填充: {padding}): output/tiles.png
preview_generated = ✓ 预览已生成: {path}
temp_files_removed = 🗑️ 临时文件已删除，temp/ 文件夹为空
temp_files_preserved = 📁 临时文件保留在 temp/ 中
process_completed = ✅ 处理完成。唯一图块数: {n}
process_completed_extra = ✅ 处理完成。唯一图块数: {real} + {extra} 额外透明 = {total} 总图块数
note_transparency = ℹ️  注：图块ID 0 是唯一用于透明的。
local_palette_usage = 📊 局部调色板使用: {counts}
error_tileset_too_big = ❌ 错误：图块集超过1024图块。已生成: {n}。使用 --extra-transparent-tiles 0 并减少颜色或尺寸。
error_loading_image = ❌ 错误：无法加载图像。检查文件是否存在且为有效PNG。示例: gba_auto.py input.png
error_cleaning_temp = ⚠️ 警告：无法清理 temp/。关闭打开的文件或重启。详情: {e}
error_invalid_origin = ❌ 错误：--origin 无效。使用如 "0,0"、"10,20" 或 "1t,2t" (1t=8px) 的坐标。示例: --origin 8,8
error_origin_out_of_bounds = ❌ 错误：原点 ({x},{y}) 超出范围 (0,0) 到 ({w},{h})。调整 --origin 或使用 --output-size。
error_crop_too_small = ❌ 错误：裁剪区域太小。至少需 8x8 像素。使用 --output-size 控制尺寸。
error_crop_exceeds = ❌ 错误：裁剪区域超出图像尺寸。需要: {w}x{h}，可用: {aw}x{ah}
error_image_too_big = ❌ 错误：图像超过512x512。请使用 --output-size 或 --end 裁剪。
error_dimensions_not_multiple = ❌ 错误：尺寸必须是8的倍数。请使用 --output-size 调整。
error_num_palettes = 错误：--num-palettes 必须在1到16之间。
error_start_index = 错误：--start-index 必须在0到15之间。
error_end_and_output_size = 错误：--end 和 --output-size 不能同时使用。
error_transparent_color = 错误：--transparent-color 必须是 'R,G,B' 格式，值在0到255之间。
preprocessing_replacing = ✓ 预处理：替换 {trans} → 标记色 {marker}
opaque_pixels =   → 不透明像素 {trans}: {count}
replaced_pixels =   → 已替换: {count} 像素 → {marker}
marker_image_saved =   → 标记图像已保存: {path}
image_valid = ✓ 图像有效: {w}x{h} 像素
padded_image = ✓ 填充至 {w}x{h} 像素的透明图块
splitting_groups = 1. 分割为组 (标记色背景)... 完成
quantizing_4bpp = 2. 使用 IrfanView 量化... 完成
applying_gba_palette = 3. 应用 GBA 调色板格式... 完成
extracting_palettes = 4. 提取调色板... 完成
rebuilding_image = 5. 重建最终图像... 完成
generating_assets = 6. 生成最终资源... 完成
indexed_with_palette = ↳ 使用强制调色板索引: {path}
error_ensure_gba = ❌ 错误: {e}
error_apply_gba_palette = ❌ 应用 GBA 调色板到组_{i} 时出错: {e}
error_preview = ❌ 生成 preview.png 时出错: {e}
error_tilemap_num_palettes_forbidden = ❌ 错误：不能在使用 --tilemap 时使用 --num-palettes。调色板数量由 tilemap 决定。请移除 --num-palettes 选项。help_description = 将 PNG 转换为带多个调色板的 GBA 4bpp。
help_epilog = 示例:\n  gba_auto.py portada.png --num-palettes 4 --output-size screen --transparent-color \"0,200,0\"\n  gba_auto.py bg.png --tilemap map.bin --start-index 4 --keep-transparent\n  gba_auto.py sprite.png --origin 16,16 --end 64,64 --extra-transparent-tiles 2\n  gba_auto.py full.png --output-size bg1 --keep-temp\n\n说明:\n  - 使用 --transparent-color 定义透明色 (默认: 0,0,0)。\n  - 使用 --keep-transparent 在调色板中保留该颜色。\n  - --output-size 支持: screen, bg0, bg1, bg2, bg3, 或 Wt,Ht (例如 8t,8t = 64x64)。\n  - 所有坐标可使用 't' 表示图块单位 (1t = 8px)