; ── CLI help (core/main.py argparse) ─────────────────────────────────────────
help_description = Converte PNG ou BMP para GBA 4bpp multi-paleta.
help_epilog = Exemplos:\n  gba_auto.py portada.png --num-palettes 4 --output-size screen\n  gba_auto.py bg.png --tilemap map.bin --start-index 4\n  gba_auto.py sprite.png --origin 16,16 --end 64,64\n\nNotas:\n  - --transparent-color define a transparência (padrão: 0,0,0).\n  - --keep-transparent mantém a cor na paleta.\n  - --output-size aceita: screen, bg0, bg1, bg2, bg3, ou Wt,Ht.
