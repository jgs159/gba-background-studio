; ── CLI help ──────────────────────────────────────────────────────────────────
help_description = Chuyển đổi PNG hoặc BMP sang định dạng GBA 4bpp với nhiều bảng màu.
help_epilog = Ví dụ:\n  gba_auto.py portada.png --num-palettes 4 --output-size screen\n  gba_auto.py bg.png --tilemap map.bin --start-index 4\n\nGhi chú:\n  - Dùng --transparent-color để định nghĩa màu trong suốt (mặc định: 0,0,0).\n  - --output-size chấp nhận: screen, bg0, bg1, bg2, bg3 hoặc Wt,Ht.
