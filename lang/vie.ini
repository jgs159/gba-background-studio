contribute_text = <h3>❤️ Hỗ trợ phát triển GBA Background Studio</h3><p>Nếu bạn thích ứng dụng này và thấy nó hữu ích cho dự án GBA của mình, vui lòng cân nhắc hỗ trợ công việc của tôi!</p><p>Sự ủng hộ của bạn giúp tôi tiếp tục cải thiện công cụ này và thêm các tính năng mới.</p><p><b>Bạn có thể đóng góp tại:</b></p><p style="text-align: center; font-size: 14px;"><a href="https://ko-fi.com/compumax">https://ko-fi.com/compumax</a></p><p>Mọi đóng góp, dù nhỏ, đều mang lại sự khác biệt lớn! Cảm ơn bạn đã sử dụng phần mềm. 🎮</p>

