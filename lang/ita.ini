; ── CLI help (core/main.py argparse) ─────────────────────────────────────────
help_description = Converte PNG o BMP in GBA 4bpp multi-palette.
help_epilog = Esempi:\n  gba_auto.py portada.png --num-palettes 4 --output-size screen\n  gba_auto.py bg.png --tilemap map.bin --start-index 4\n  gba_auto.py sprite.png --origin 16,16 --end 64,64\n\nNote:\n  - --transparent-color definisce la trasparenza (default: 0,0,0).\n  - --keep-transparent mantiene il colore nella palette.\n  - --output-size accetta: screen, bg0, bg1, bg2, bg3 o Wt,Ht.
