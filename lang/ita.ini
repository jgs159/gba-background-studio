[lang]
palette_saved = ✓ Palette salvata: output/palette.pal
tilemap_saved = ✓ Mappa dei tile salvata: output/map.bin
tileset_saved = ✓ Tileset salvato ({n} tile, padding: {padding}): output/tiles.png
preview_generated = ✓ Anteprima generata: {path}
temp_files_removed = 🗑️ File temporanei rimossi, cartella temp/ vuota
temp_files_preserved = 📁 File temporanei preservati in temp/
process_completed = ✅ Processo completato. Tile unici: {n}
process_completed_extra = ✅ Processo completato. Tile unici: {real} + {extra} trasparenti extra = {total} tile totali
note_transparency = ℹ️  Nota: l'ID tile 0 è l'unico usato per la trasparenza.
local_palette_usage = 📊 Utilizzo palette locali: {counts}
error_tileset_too_big = ❌ Errore: il tileset supera i 1024 tile. Generati: {n}. Usa --extra-transparent-tiles 0 e riduci colori o dimensioni.
error_loading_image = ❌ Errore: impossibile caricare l'immagine. Verifica che il file esista ed sia un PNG valido. Esempio: gba_auto.py input.png
error_cleaning_temp = ⚠️ Avviso: impossibile pulire temp/. Chiudi i file aperti o riavvia. Dettagli: {e}
error_invalid_origin = ❌ Errore: --origin non valido. Usa coordinate come "0,0", "10,20" o "1t,2t" (1t = 8px). Esempio: --origin 8,8
error_origin_out_of_bounds = ❌ Errore: origine ({x},{y}) fuori dai limiti (0,0) a ({w},{h}). Modifica --origin o usa --output-size.
error_crop_too_small = ❌ Errore: area di ritaglio troppo piccola. Deve essere almeno 8x8 pixel. Usa --output-size per controllare le dimensioni.
error_crop_exceeds = ❌ Errore: l'area di ritaglio supera le dimensioni dell'immagine. Richiesto: {w}x{h}, Disponibile: {aw}x{ah}
error_image_too_big = ❌ Errore: l'immagine supera 512x512. Usa --output-size o --end per ritagliare.
error_dimensions_not_multiple = ❌ Errore: le dimensioni devono essere multiple di 8. Usa --output-size per aggiustare.
error_num_palettes = Errore: --num-palettes deve essere tra 1 e 16.
error_start_index = Errore: --start-index deve essere tra 0 e 15.
error_end_and_output_size = Errore: --end e --output-size non possono essere usati insieme.
error_transparent_color = Errore: --transparent-color deve essere 'R,G,B' con valori tra 0 e 255.
preprocessing_replacing = ✓ Pre-elaborazione: sostituisco {trans} → MARKER_COLOR {marker}
opaque_pixels =   → Pixel opachi {trans}: {count}
replaced_pixels =   → Sostituiti: {count} pixel → {marker}
marker_image_saved =   → Immagine con marker salvata: {path}
image_valid = ✓ Immagine valida: {w}x{h} px
padded_image = ✓ Riempito a {w}x{h} px con tile trasparenti
splitting_groups = 1. Suddivisione in gruppi (sfondo MARKER_COLOR)... OK
quantizing_4bpp = 2. Quantizzazione con IrfanView... OK
applying_gba_palette = 3. Applicazione formato palette GBA... OK
extracting_palettes = 4. Estrazione palette... OK
rebuilding_image = 5. Ricostruzione immagine finale... OK
generating_assets = 6. Generazione asset finali... OK
indexed_with_palette = ↳ Indexato con palette forzata: {path}
error_ensure_gba = ❌ Errore: {e}
error_apply_gba_palette = ❌ Errore applicando palette GBA al gruppo_{i}: {e}
error_preview = ❌ Errore generando preview.png: {e}
error_tilemap_num_palettes_forbidden = ❌ Errore: non è possibile usare --num-palettes con --tilemap. Il numero di palette è determinato dal tilemap. Rimuovi l'opzione --num-palettes.
help_description = Converti PNG in 4bpp per GBA con palette multiple.
help_epilog = Esempi:\n  gba_auto.py portada.png --num-palettes 4 --output-size screen --transparent-color \"0,200,0\"\n  gba_auto.py bg.png --tilemap map.bin --start-index 4 --keep-transparent\n  gba_auto.py sprite.png --origin 16,16 --end 64,64 --extra-transparent-tiles 2\n  gba_auto.py full.png --output-size bg1 --keep-temp\n\nNote:\n  - Usa --transparent-color per definire il colore trasparente (default: 0,0,0).\n  - Usa --keep-transparent per preservare quel colore nella palette.\n  - --output-size accetta: screen, bg0, bg1, bg2, bg3, o Wt,Ht (es. 8t,8t = 64x64).\n  - Tutte le coordinate possono usare 't' per unità tile (1t = 8px)
