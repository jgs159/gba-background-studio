; ── CLI help (core/main.py argparse) ─────────────────────────────────────────
help_description = Convertit PNG/BMP en GBA 4bpp multi-palettes.
help_epilog = Exemples :\n  gba_auto.py portada.png --num-palettes 4 --output-size screen\n  gba_auto.py bg.png --tilemap map.bin --start-index 4\n  gba_auto.py sprite.png --origin 16,16 --end 64,64\n\nNotes :\n  - --transparent-color définit la transparence (défaut : 0,0,0).\n  - --keep-transparent préserve la couleur en palette.\n  - --output-size : screen, bg0, bg1, bg2, bg3 ou Wt,Ht.
