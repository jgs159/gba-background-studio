[lang]
palette_saved = ✓ Palette sauvegardée : output/palette.pal
tilemap_saved = ✓ Tilemap sauvegardé : output/map.bin
tileset_saved = ✓ Tileset sauvegardé ({n} tuiles, remplissage : {padding}) : output/tiles.png
preview_generated = ✓ Aperçu généré : {path}
temp_files_removed = 🗑️ Fichiers temporaires supprimés, dossier temp/ vide
temp_files_preserved = 📁 Fichiers temporaires conservés dans temp/
process_completed = ✅ Processus terminé. Tuiles uniques : {n}
process_completed_extra = ✅ Processus terminé. Tuiles uniques : {real} + {extra} transparentes supplémentaires = {total} tuiles au total
note_transparency = ℹ️  Note : l'ID de tuile 0 est la seule utilisée pour la transparence.
local_palette_usage = 📊 Utilisation des palettes locales : {counts}
error_tileset_too_big = ❌ Erreur : le tileset dépasse 1024 tuiles. Générées : {n}. Utilisez --extra-transparent-tiles 0 et réduisez l'utilisation des couleurs ou la taille.
error_loading_image = ❌ Erreur : échec du chargement de l'image. Vérifiez que le fichier existe et est un PNG valide. Exemple : gba_auto.py input.png
error_cleaning_temp = ⚠️ Avertissement : échec du nettoyage de temp/. Fermez les fichiers ouverts ou redémarrez. Détails : {e}
error_invalid_origin = ❌ Erreur : --origin invalide. Utilisez des coordonnées comme "0,0", "10,20" ou "1t,2t" (1t = 8px). Exemple : --origin 8,8
error_origin_out_of_bounds = ❌ Erreur : origine ({x},{y}) hors limites (0,0) à ({w},{h}). Ajustez --origin ou utilisez --output-size.
error_crop_too_small = ❌ Erreur : zone de recadrage trop petite. Doit faire au moins 8x8 pixels. Utilisez --output-size pour contrôler les dimensions.
error_crop_exceeds = ❌ Erreur : la zone de recadrage dépasse la taille de l'image. Nécessaire : {w}x{h}, Disponible : {aw}x{ah}
error_image_too_big = ❌ Erreur : l'image dépasse 512x512. Utilisez --output-size ou --end pour recadrer.
error_dimensions_not_multiple = ❌ Erreur : les dimensions doivent être multiples de 8. Utilisez --output-size pour ajuster.
error_num_palettes = Erreur : --num-palettes doit être compris entre 1 et 16.
error_start_index = Erreur : --start-index doit être compris entre 0 et 15.
error_end_and_output_size = Erreur : --end et --output-size ne peuvent pas être utilisés ensemble.
error_transparent_color = Erreur : --transparent-color doit être au format 'R,G,B' avec des valeurs entre 0 et 255.
preprocessing_replacing = ✓ Prétraitement : remplacement de {trans} → MARKER_COLOR {marker}
opaque_pixels =   → Pixels opaques {trans} : {count}
replaced_pixels =   → Remplacés : {count} pixels → {marker}
marker_image_saved =   → Image du marqueur sauvegardée : {path}
image_valid = ✓ Image valide : {w}x{h} px
padded_image = ✓ Rempli à {w}x{h} px avec des tuiles transparentes
splitting_groups = 1. Séparation en groupes (fond MARKER_COLOR)... OK
quantizing_4bpp = 2. Quantification avec IrfanView... OK
applying_gba_palette = 3. Application du format de palette GBA... OK
extracting_palettes = 4. Extraction des palettes... OK
rebuilding_image = 5. Reconstruction de l'image finale... OK
generating_assets = 6. Génération des ressources finales... OK
indexed_with_palette = ↳ Indexé avec palette forcée : {path}
error_ensure_gba = ❌ Erreur : {e}
error_apply_gba_palette = ❌ Erreur lors de l'application de la palette GBA au groupe_{i} : {e}
error_preview = ❌ Erreur lors de la génération de preview.png : {e}
error_tilemap_num_palettes_forbidden = ❌ Erreur : --num-palettes ne peut pas être utilisé avec --tilemap. Le nombre de palettes est déterminé par le tilemap. Supprimez l'option --num-palettes.
help_description = Convertir un PNG en 4bpp GBA avec plusieurs palettes.
help_epilog = Exemples :\n  gba_auto.py portada.png --num-palettes 4 --output-size screen --transparent-color "0,200,0"\n  gba_auto.py bg.png --tilemap map.bin --start-index 4 --keep-transparent\n  gba_auto.py sprite.png --origin 16,16 --end 64,64 --extra-transparent-tiles 2\n  gba_auto.py full.png --output-size bg1 --keep-temp\n\nNotes :\n  - Utilisez --transparent-color pour définir la couleur transparente (par défaut : 0,0,0).\n  - Utilisez --keep-transparent pour préserver cette couleur dans la palette.\n  - --output-size accepte : screen, bg0, bg1, bg2, bg3, ou Wt,Ht (ex : 8t,8t = 64x64).\n  - Toutes les coordonnées peuvent utiliser 't' pour les unités de tuile (1t = 8px).
